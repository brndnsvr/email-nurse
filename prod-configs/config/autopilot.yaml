# Autopilot Configuration
# Natural language instructions for AI email processing

# Message retrieval provider (applescript, sysm, hybrid)
# sysm is 44-51% faster for message retrieval
message_provider: sysm

# Your instructions to the AI - be specific about what you want
instructions: |
  You are managing my personal email inbox. Follow these guidelines:

  1. NEWSLETTERS & MARKETING:
     - Move promotional emails to "Marketing" folder
     - Move newsletters I'm subscribed to to "Newsletters" folder
     - Delete obvious spam

  2. IMPORTANT:
     - Flag emails from my contacts list as important
     - Leave emails about appointments or travel alone (ignore action)
     - Never delete emails from real people

  3. FINANCIAL EMAILS:
     - Eastman Credit Union (ECU) or Chase: leave in inbox (ignore action)
     - Payment failures, declined payments, billing errors, or "unable to process payment" emails from ANY sender: leave in inbox (ignore action) — these are urgent and need immediate attention
     - All other financial/banking emails: move to "Finance" folder

  4. NOTIFICATIONS:
     - Move automated notifications from services (GitHub, etc.) to "Notifications" folder
     - Move social media notifications (LinkedIn, Facebook, Instagram, TikTok, etc. but NOT Reddit) to Social folder

  5. REPLIES:
     - Do not auto-reply to anything without my approval

  6. SORTING EMAIL INTO FOLDERS:
     - Keep emails on their own account — move to folders on the same account the email came from
     - Trash and Archive operations stay on the originating account

  7. CALENDAR INVITES:
     - If an email is a calendar invite/meeting request and the event date has PASSED, delete it
     - Future calendar invites: leave in inbox (ignore action)
     - Look for event dates in the subject line or email body to determine if past/future

  8. REMINDERS:
     - You may create reminders for emails that need follow-up
     - NEVER create reminders for monitoring/alerting emails from:
       LibreNMS, LogicMonitor, NtwkCmdr, or Rancid

  9. ARCHIVE ACTION:
     - NEVER use the 'archive' action
     - If you would archive something, use 'ignore' instead to leave it in the inbox
     - Or move it to an appropriate folder

  10. ORDER CONFIRMATIONS & SHIPMENTS:
      - Order confirmations, receipts → move to "Orders" folder
      - ALL shipping/delivery notifications (Amazon shipment-tracking, UPS, FedEx, USPS tracking) → move to "Orders" folder
      - Do NOT move shipment notifications to "Notifications" - they belong in "Orders"
      - Do NOT classify vendor order emails as Marketing

  When in doubt, use 'ignore' action to leave email untouched.

# Mailboxes to process
mailboxes:
  - INBOX

# Specific accounts to process (empty = all accounts)
accounts:
  - iCloud
  - CSquare
  - Gmail

# Maximum age of emails to process (days)
max_age_days: 3000

# Central account for all move/archive operations (optional)
# If set, emails from other accounts will be moved to folders on this account
# main_account: iCloud

# Folders that route to local "On My Mac" mailboxes instead of account folders
# Messages matching rules for these folders will be moved to local storage
# Uncomment to enable local folder routing:
# local_folders:
#   - Newsletters
#   - Marketing
#   - Real Estate

# Senders to exclude (substring match)
exclude_senders:
  - "noreply@yourbank.com"
  - "security@"

# Subjects to exclude (substring match)
exclude_subjects:
  - "Password Reset"
  - "Two-Factor"
  - "2FA"
  - "Verification Code"

# Quick rules - processed BEFORE AI (instant, no API cost)
# First match wins, so put specific rules before general ones
#  Match conditions available:
#  - sender_contains: [list] - substring match in sender
#  - subject_contains: [list] - substring match in subject
#  - sender_domain: [list] - email domain match
#
#  Actions available:
#  - delete - move to trash
#  - move - requires folder: field
#  - archive - move to Archive
#  - mark_read - just mark as read
#  - ignore - skip, don't pass to AI either

quick_rules:
  # Phishing security tests (X-PHISH header) → Phishing folder
  - name: "Phishing Security Tests"
    match:
      header_contains: ["phishing security test"]
    action: move
    folder: Phishing

  # LogicMonitor alerts → ignore (Outlook server-side rule handling moves)
  - name: "LogicMonitor Alerts"
    match:
      sender_contains: ["alerter@evoquedcs.logicmonitor.com"]
    action: ignore

  # LogicMonitor reports → LogicMonitor folder
  - name: "LogicMonitor Reports"
    match:
      sender_contains: ["reports@evoquedcs.logicmonitor.com"]
      subject_contains: ["Report"]
    action: move
    folder: LogicMonitor

  # LibreNMS alerts → LibreNMS Alerts folder
